name: fhs-infra

services:
  postgres:
    image: postgres:16-alpine
    container_name: fhs-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-craft_pg}
      POSTGRES_USER: ${DB_USER:-craft}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-craft}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/forresthill-postgres/forresthill.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-craft} -d ${DB_DATABASE:-craft_pg}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Craft CMS Queue Worker
  craft-queue:
    build:
      context: ./apps/forresthill-postgres
      dockerfile: docker/php/Dockerfile
    container_name: fhs-craft-queue
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    env_file: .env
    command: ["php", "craft", "queue/listen"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[p]hp craft queue/listen' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: fhs-caddy
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:Z
      - caddy_data:/data
      - caddy_config:/config
      # Shared build directories for SSG
      - ./apps/fhstv-svelte-5/build:/var/www/fhstv:ro
      - ./apps/forresthill-postgres:/var/www/html:ro
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SITE_DOMAIN=${SITE_DOMAIN}
      - FHSTV_DOMAIN=${FHSTV_DOMAIN}
      - API_DOMAIN=${API_DOMAIN}
      - CADDY_EMAIL=${CADDY_EMAIL}
    networks:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:2019/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  frontend:
  backend:
    internal: true

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
