name: fhs-infra

  postgres:
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "effective_cache_size=1536MB"
    restart: unless-stopped

  # Craft CMS App (Production Build)
  craft-app:
    build:
      context: ./apps/forresthill-postgres
      dockerfile: docker/php/Dockerfile
      args:
        - PUID=${PUID:-1000}
        - PGID=${PGID:-1000}
    container_name: fhs-craft-app
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    # In production, we don't mount volumes for code; it's bundled in the image
    volumes:
      - ./apps/forresthill-postgres/web:/var/www/html/web:rw
      - ./apps/forresthill-postgres/storage:/var/www/html/storage:rw
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Craft CMS Queue Worker (Production Build)
  craft-queue:
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

  # Calendar Sync Service (Production Build)
  calendar-sync:
    build:
      context: ./apps/fhs-calendar-sync
      dockerfile: Dockerfile
    container_name: fhs-calendar-sync
    volumes:
      - ./data/calendar-sync:/app/data:rw
      - ./apps/fhs-calendar-sync/semper-service-account.json:/app/config/service-account.json:ro
    env_file: .env
    networks:
      - frontend
      - backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Caddy (Production Configuration with Cache Module)
  caddy:
    build:
      context: .
      dockerfile: docker/caddy/Dockerfile
    container_name: fhs-caddy
    volumes:
      - ./caddy/Caddyfile.prod:/etc/caddy/Caddyfile:Z
      - caddy_data:/data
      - caddy_config:/config
      # Mount built SSG files
      - ./apps/fhstv-svelte-5/build:/var/www/fhstv:ro
      - ./apps/forresthill-postgres:/var/www/html:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend
    restart: unless-stopped
