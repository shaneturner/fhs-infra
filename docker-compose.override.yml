name: fhs-infra

services:
  # Craft CMS App
  craft-app:
    build:
      context: ./apps/forresthill-postgres
      dockerfile: docker/php/Dockerfile
      args:
        - PUID=${PUID:-1000}
        - PGID=${PGID:-1000}
    container_name: fhs-craft-app
    user: "www-data"
    volumes:
      - ./apps/forresthill-postgres:/var/www/html:Z
    environment:
      - PHP_OPCACHE_ENABLE=1
      - PHP_OPCACHE_REVALIDATE_FREQ=2
      - PRIMARY_SITE_URL=${PRIMARY_SITE_URL:-http://forresthill.localhost}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    develop:
      watch:
        - path: ./apps/forresthill-postgres/composer.json
          action: rebuild
        - path: ./apps/forresthill-postgres/templates
          action: sync
          target: /var/www/html/templates

  # Craft CMS Queue Worker
  craft-queue:
    build:
      context: ./apps/forresthill-postgres
      dockerfile: docker/php/Dockerfile
      args:
        - PUID=${PUID:-1000}
        - PGID=${PGID:-1000}
    container_name: fhs-craft-queue
    user: "www-data"
    volumes:
      - ./apps/forresthill-postgres:/var/www/html:Z
    environment:
      - PHP_OPCACHE_ENABLE=1
      - PHP_OPCACHE_REVALIDATE_FREQ=2
      - PRIMARY_SITE_URL=${PRIMARY_SITE_URL:-http://forresthill.localhost}

  # Mailpit Dev Tool
  mailpit:
    image: axllent/mailpit
    container_name: fhs-mailpit
    networks:
      - backend
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 5000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8025/api/v1/info"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # FHSTV Svelte Dev Server
  fhstv-dev:
    image: node:24-alpine
    container_name: fhs-fhstv-dev
    user: "${PUID:-1000}:${PGID:-1000}"
    working_dir: /app
    environment:
      - NODE_ENV=development
      - HOME=/tmp/home # Ensure npm/pnpm can write config/cache as non-root
      - COREPACK_HOME=/tmp/corepack
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-http://192.168.1.208}
    volumes:
      - ./apps/fhstv-svelte-5:/app:Z
    # Note: we use corepack to run pnpm directly without 'enable' to avoid root requirements
    command: >
      sh -c "mkdir -p /tmp/corepack && corepack pnpm install && corepack pnpm dev --host"
    networks:
      - frontend
    depends_on:
      - craft-app
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5173"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Calendar Sync Service
  calendar-sync:
    build:
      context: ./apps/fhs-calendar-sync
      dockerfile: Dockerfile
    container_name: fhs-calendar-sync
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - ./apps/fhs-calendar-sync/data:/app/data:Z
      - ./${GOOGLE_APPLICATION_CREDENTIALS_PATH:-./apps/fhs-calendar-sync/semper-service-account.json}:/app/config/service-account.json:ro,Z
    environment:
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/config/service-account.json
      - DATABASE_URL=sqlite:/app/data/database.sqlite
      - SYNC_INTERVAL_MINUTES=${SYNC_INTERVAL_MINUTES:-60}
      - API_PREFIX=${API_PREFIX:-}
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
